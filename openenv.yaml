name: misinfo-detection
version: "1.0.0"
description: >
  An RL environment where an AI agent investigates news articles to determine
  whether they are real or misinformation. The agent must reason through
  evidence, assess source credibility, and give calibrated verdicts.
  Designed for training and evaluating agents on real-world media literacy tasks.

author: "misinfo-env team"
tags:
  - openenv
  - misinformation
  - fact-checking
  - media-literacy
  - nlp

tasks:
  - name: easy
    description: "Classify a news headline as real or fake in a single step."
    difficulty: easy
    max_steps: 1
    success_threshold: 0.95
    reward_range: [0.01, 0.99]

  - name: medium
    description: >
      Multi-step investigation over 3 steps: observe snippet, ask clarifying
      question, search for evidence, then give a verdict with explanation.
    difficulty: medium
    max_steps: 3
    success_threshold: 0.5
    reward_range: [0.01, 0.99]

  - name: hard
    description: >
      Full 5-step investigation: identify suspicious claim, search for evidence,
      assess source credibility, cross-check with consensus, deliver a calibrated
      verdict with confidence score. Rewards source awareness and reasoning depth.
    difficulty: hard
    max_steps: 5
    success_threshold: 0.5
    reward_range: [0.01, 0.99]

observation_space:
  type: object
  fields:
    task:         { type: string, description: "Task level: easy | medium | hard" }
    step:         { type: integer, description: "Current step index (0-based)" }
    max_steps:    { type: integer, description: "Total steps in this episode" }
    article_text: { type: string,  description: "News article text shown to agent" }
    source:       { type: string,  nullable: true, description: "Source/subject (hard only)" }
    prompt:       { type: string,  description: "Instructions for current step" }
    score:        { type: float,   description: "Cumulative reward so far (0.01 to 0.99)" }
    done:         { type: boolean, description: "Whether episode has ended" }
    feedback:     { type: string,  description: "Human-readable feedback on last action" }

action_space:
  type: object
  fields:
    action_type:
      type: string
      enum: [classify, question, search, assess_source, cross_check, verdict]
      description: "Type of action the agent takes this step"
    answer:
      type: string
      nullable: true
      description: "Classification label: 'real' or 'fake' (used in classify/verdict)"
    query:
      type: string
      nullable: true
      description: "Free-text query or reasoning (used in question/search/cross_check)"
    explanation:
      type: string
      nullable: true
      description: "Detailed reasoning for the action"
    confidence:
      type: float
      nullable: true
      description: "Agent's confidence between 0.01 and 0.99 — used in hard verdict for calibration scoring"

reward_space:
  type: object
  fields:
    total:              { type: float, description: "Overall reward for this step (0.01 to 0.99)" }
    correctness:        { type: float, description: "Accuracy of classification" }
    reasoning_quality:  { type: float, description: "Quality and depth of reasoning" }
    source_awareness:   { type: float, description: "Understanding of source credibility" }
    efficiency:         { type: float, description: "Calibration and step efficiency" }
    feedback:           { type: string, description: "Human-readable grading feedback" }
